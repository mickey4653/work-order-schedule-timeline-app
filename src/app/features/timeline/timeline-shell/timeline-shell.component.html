<div class="timeline-shell">
  <!-- Top Header Section -->
  <div class="timeline-header-section">
    <!-- Logo -->
    <img src="assets/naologic-logo.png" alt="Naologic Logo" class="logo">
    
    <!-- Title -->
    <h1 class="page-title">Work Orders</h1>
    
    <!-- Timescale Label + ng-select Dropdown -->
    <div class="header-bottom">
      <label class="zoom-label">Timescale</label>
      <ng-select
        [items]="zoomLevels"
        bindLabel="label"
        bindValue="value"
        [(ngModel)]="selectedZoomLevel"
        (ngModelChange)="onZoomLevelChange($any($event))"
        [clearable]="false"
        [searchable]="false"
        [dropdownPosition]="'bottom'"
        class="zoom-dropdown">
      </ng-select>
    </div>
  </div>

  <div class="timeline-layout">
    <!-- Left fixed panel for work center names -->
    <div class="work-centers-panel">
      <div class="work-centers-header">Work Centers</div>
      <div class="work-centers-list">
        <div 
          class="work-center-row" 
          *ngFor="let center of workCenters$ | async">
          {{ center.data.name }}
        </div>
      </div>
    </div>

    <!-- Right scrollable timeline grid -->
    <div class="timeline-panel">
      <!-- Sticky header row for dates -->
      <div class="timeline-header">
        <div class="date-columns" [style.width.px]="totalWidth$ | async">
          <div 
            class="date-column"
            *ngFor="let column of dateColumns$ | async"
            [style.left.px]="column.position"
            [style.width.px]="columnWidth$ | async">
            <span class="date-label">{{ column.label }}</span>
          </div>
        </div>
      </div>

      <!-- Scrollable grid area -->
      <div class="timeline-grid-container">
        <!-- Vertical grid lines -->
        <div class="vertical-grid-lines" [style.width.px]="totalWidth$ | async">
          <div 
            class="vertical-grid-line"
            *ngFor="let column of dateColumns$ | async"
            [style.left.px]="column.position">
          </div>
        </div>

        <app-timeline-grid
          [workCenters]="(workCenters$ | async) || []"
          [workOrders]="(workOrders$ | async) || []"
          [visibleStartDate]="(visibleStartDate$ | async) || null"
          [columnWidth]="(columnWidth$ | async) || 80"
          [totalColumns]="60"
          (cellClicked)="onGridCellClicked($event)"
          (workOrderEdit)="onWorkOrderEdit($event)"
          (workOrderDelete)="onWorkOrderDelete($event)">
        </app-timeline-grid>

        <!-- Current day indicator line -->
        <div 
          class="current-day-indicator"
          [style.left.px]="currentDayPosition$ | async">
        </div>

        <!-- Current month badge - positioned at current day -->
        <div 
          class="current-month-badge-overlay"
          [style.left.px]="currentDayPosition$ | async">
          Current month
        </div>
      </div>
    </div>
  </div>

  <!-- Schedule Panel -->
  <app-schedule-panel
    [isOpen]="isPanelOpen"
    [workCenters]="(workCenters$ | async) || []"
    (saved)="onScheduleSaved($event)"
    (cancelled)="onScheduleCancelled()">
  </app-schedule-panel>
</div>
