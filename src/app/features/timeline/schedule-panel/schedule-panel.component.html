<div class="schedule-panel-backdrop" *ngIf="isOpen" (click)="onBackdropClick()"></div>

<div class="schedule-panel" [class.schedule-panel--open]="isOpen">
  <div class="schedule-panel__header">
    <div>
      <h2>{{ panelTitle }}</h2>
      <p class="schedule-panel__subtitle">Specify the dates, name status for this order</p>
    </div>
    <div class="schedule-panel__actions">
      <button type="button" class="btn btn-secondary" (click)="onCancel()">
        Cancel
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid || isSaving" (click)="onSubmit()">
        {{ isSaving ? (isEditMode ? 'Updating...' : 'Creating...') : submitButtonText }}
      </button>
    </div>
  </div>

  <form [formGroup]="form" class="schedule-panel__form">
    <div class="form-group">
      <label for="name">Work Order Name</label>
      <input 
        id="name"
        type="text" 
        formControlName="name"
        class="form-control"
        placeholder="Enter work order name">
      <div class="error-message" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
        Work order name is required
      </div>
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <ng-select
        [items]="statusOptions"
        bindLabel="label"
        bindValue="value"
        formControlName="status"
        [clearable]="false"
        [searchable]="false"
        class="status-select">
        <ng-template ng-label-tmp let-item="item">
          <div class="status-badge" [class]="'status-badge--' + item.value">
            {{ item.label }}
          </div>
        </ng-template>
        <ng-template ng-option-tmp let-item="item">
          {{ item.label }}
        </ng-template>
      </ng-select>
    </div>

    <div class="form-group">
      <label for="endDate">End Date</label>
      <input 
        class="form-control"
        placeholder="yyyy-mm-dd"
        name="endDate"
        formControlName="endDate"
        ngbDatepicker
        #endDatePicker="ngbDatepicker"
        (click)="endDatePicker.toggle()">
      <div class="error-message" *ngIf="form.get('endDate')?.invalid && form.get('endDate')?.touched">
        End date is required and must be after start date
      </div>
    </div>

    <div class="form-group">
      <label for="startDate">Start Date</label>
      <input 
        class="form-control"
        placeholder="yyyy-mm-dd"
        name="startDate"
        formControlName="startDate"
        ngbDatepicker
        #startDatePicker="ngbDatepicker"
        (click)="startDatePicker.toggle()">
      <div class="error-message" *ngIf="form.get('startDate')?.invalid && form.get('startDate')?.touched">
        Start date is required
      </div>
    </div>

    <div class="error-message error-message--overlap" *ngIf="overlapError">
      {{ overlapError }}
    </div>
  </form>
</div>
